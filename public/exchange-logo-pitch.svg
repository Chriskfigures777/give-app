<svg width="320" height="72" viewBox="0 0 320 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Three connected circles mark (the actual Exchange logo) -->
  <g transform="translate(8, 12) scale(1.1)">
    <!-- Connecting arc -->
    <path d="M3 16 Q12 -4 24 4 Q36 12 45 16" stroke="#10b981" stroke-width="2.8" stroke-linecap="butt" fill="none"/>
    <!-- Left node -->
    <circle cx="6"  cy="16" r="6" fill="#10b981"/>
    <!-- Top middle node -->
    <circle cx="24" cy="4"  r="6" fill="#10b981"/>
    <!-- Right node -->
    <circle cx="42" cy="16" r="6" fill="#10b981"/>
  </g>

  <!-- Wordmark: "The" small caps + "Exchange" bold  white for dark backgrounds -->
  <text x="72" y="26"
        font-family="'Barlow', system-ui, sans-serif"
        font-size="13"
        font-weight="600"
        letter-spacing="3px"
        fill="#FFFFFF"
        opacity="0.75">
    THE
  </text>
  <text x="72" y="56"
        font-family="'Barlow', system-ui, sans-serif"
        font-size="34"
        font-weight="800"
        letter-spacing="-0.5px"
        fill="#FFFFFF">
    Exchange
  </text>
</svg>
